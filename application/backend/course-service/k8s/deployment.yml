apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
  labels:
    app: course-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: course-service
  template:
    metadata:
      labels:
        app: course-service
    spec:
      containers:
        - name: course-service
          image: 138035228373.dkr.ecr.eu-north-1.amazonaws.com/backend/course-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: course-service
  labels:
    app: course-service
spec:
  type: ClusterIP
  selector:
    app: course-service
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
